name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Sync fxmanifest version
        run: sed -i "s/^version '.*'$/version '${{ steps.ver.outputs.version }}'/" fxmanifest.lua

      - name: Install web deps
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build web
        working-directory: web
        run: bun run build

      - name: Package
        run: |
          name=${{ github.event.repository.name }}
          mkdir -p dist/$name
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='*.log' \
            --exclude='web/node_modules' \
            --exclude='web/src' \
            --exclude='web/index.html' \
            --exclude='web/package.json' \
            --exclude='web/bun.lock' \
            --exclude='web/tsconfig*.json' \
            --exclude='web/tsconfig.tsbuildinfo' \
            --exclude='web/vite.config.ts' \
            --exclude='web/.vite' \
            ./ dist/$name/
          cd dist && zip -qr ../$name.zip $name

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.event.repository.name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
